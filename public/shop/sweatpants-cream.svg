<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Cream sweatpants">
  
  <defs>
    <radialGradient id="floor" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#FFFFFF"/>
  <ellipse cx="600" cy="1160" rx="380" ry="32" fill="url(#floor)"/>
  <g filter="url(#soft)">
    <!-- Waistband -->
    <rect x="380" y="160" width="440" height="48" rx="6" fill="#F4ECDC"/>
    <g stroke="rgba(0,0,0,0.10)" stroke-width="1">
      <line x1="390" y1="170" x2="810" y2="170"/>
      <line x1="390" y1="184" x2="810" y2="184"/>
      <line x1="390" y1="196" x2="810" y2="196"/>
    </g>
    <!-- Drawstring -->
    <path d="M560,190 Q558,230 574,250 L570,262 L578,252" stroke="#FFFFFF" stroke-width="3" fill="none"/>
    <path d="M640,190 Q642,230 626,250 L622,262 L614,252" stroke="#FFFFFF" stroke-width="3" fill="none"/>
    <circle cx="570" cy="268" r="6" fill="#FFFFFF"/>
    <circle cx="622" cy="268" r="6" fill="#FFFFFF"/>
    <!-- Left leg -->
    <path d="M380,210 L590,210 L570,1140 L320,1140 Z" fill="#F4ECDC"/>
    <!-- Right leg -->
    <path d="M610,210 L820,210 L880,1140 L630,1140 Z" fill="#F4ECDC"/>
    <!-- Center seam shadow -->
    <line x1="600" y1="210" x2="600" y2="1140" stroke="rgba(0,0,0,0.07)" stroke-width="2"/>
    <!-- Side pocket lines -->
    <path d="M420,300 q-30,40 -10,90" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none"/>
    <path d="M780,300 q30,40 10,90" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none"/>
    
  </g>
  <!-- Hip/thigh graphic anchor -->
  <g transform="translate(420,520)">
    <text font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="42" fill="#1F1611" opacity="0.85"></text>
  </g>
</svg>