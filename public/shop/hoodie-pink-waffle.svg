<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Pink waffle stack hoodie">
  
  <defs>
    <radialGradient id="floor" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#FFFFFF"/>
  <ellipse cx="600" cy="1100" rx="380" ry="36" fill="url(#floor)"/>
  <!-- Hoodie body -->
  <g filter="url(#soft)">
    <!-- Sleeves -->
    <path d="M260,360 Q200,440 180,640 Q170,760 200,830 L320,810 Q300,720 320,640 Q340,560 380,500 Z" fill="#F4B7D6"/>
    <path d="M940,360 Q1000,440 1020,640 Q1030,760 1000,830 L880,810 Q900,720 880,640 Q860,560 820,500 Z" fill="#F4B7D6"/>
    <!-- Body torso -->
    <path d="M380,360 Q380,300 470,290 L730,290 Q820,300 820,360 L820,970 Q600,1010 380,970 Z" fill="#F4B7D6"/>
    <!-- Hood (back layer) -->
    <path d="M460,300 Q480,170 600,150 Q720,170 740,300 L640,310 Q660,220 600,210 Q560,220 580,310 Z" fill="#F4B7D6"/>
    <!-- Hood inner shadow -->
    <path d="M520,290 Q540,210 600,195 Q660,210 680,290 L620,300 Q640,230 600,220 Q560,230 580,300 Z" fill="#F4B7D6" opacity="0.18"/>
    <!-- Drawstrings -->
    <path d="M570,250 Q568,310 578,340 L574,350 L582,340" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.85"/>
    <path d="M630,250 Q632,310 622,340 L618,350 L610,340" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.85"/>
    <circle cx="574" cy="358" r="6" fill="#FFFFFF"/>
    <circle cx="618" cy="358" r="6" fill="#FFFFFF"/>
    <!-- Sleeve seam shading -->
    <path d="M260,360 Q230,440 220,640 Q215,760 230,830" stroke="rgba(0,0,0,0.06)" stroke-width="2" fill="none"/>
    <path d="M940,360 Q970,440 980,640 Q985,760 970,830" stroke="rgba(0,0,0,0.06)" stroke-width="2" fill="none"/>
    <!-- Shoulder seams -->
    <path d="M380,360 Q420,330 470,330" stroke="rgba(0,0,0,0.07)" stroke-width="2" fill="none"/>
    <path d="M820,360 Q780,330 730,330" stroke="rgba(0,0,0,0.07)" stroke-width="2" fill="none"/>
    <!-- Kangaroo pocket -->
    <path d="M420,720 L780,720 L760,900 L440,900 Z" fill="#F4B7D6"/>
    <path d="M420,720 L780,720" stroke="rgba(0,0,0,0.10)" stroke-width="1.5"/>
    <line x1="430" y1="725" x2="770" y2="725" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
    <!-- Pocket hand openings -->
    <path d="M450,760 Q470,755 490,760" stroke="rgba(0,0,0,0.20)" stroke-width="2" fill="none"/>
    <path d="M750,760 Q730,755 710,760" stroke="rgba(0,0,0,0.20)" stroke-width="2" fill="none"/>
    <!-- Ribbed cuffs (sleeves) -->
    <rect x="195" y="820" width="135" height="32" rx="4" fill="#F4B7D6"/>
    <rect x="870" y="820" width="135" height="32" rx="4" fill="#F4B7D6"/>
    <g stroke="rgba(0,0,0,0.10)" stroke-width="1">
      <line x1="200" y1="826" x2="325" y2="826"/>
      <line x1="200" y1="838" x2="325" y2="838"/>
      <line x1="200" y1="848" x2="325" y2="848"/>
      <line x1="875" y1="826" x2="1000" y2="826"/>
      <line x1="875" y1="838" x2="1000" y2="838"/>
      <line x1="875" y1="848" x2="1000" y2="848"/>
    </g>
    <!-- Ribbed bottom hem -->
    <rect x="385" y="950" width="430" height="38" rx="4" fill="#F4B7D6"/>
    <g stroke="rgba(0,0,0,0.10)" stroke-width="1">
      <line x1="395" y1="958" x2="805" y2="958"/>
      <line x1="395" y1="972" x2="805" y2="972"/>
      <line x1="395" y1="982" x2="805" y2="982"/>
    </g>
  </g>
  <!-- Chest graphic -->
  <g transform="translate(600,540)">
    <g transform="scale(0.95)" text-anchor="middle">
      <!-- Base waffle -->
      <g transform="translate(0,80)">
        <rect x="-110" y="-40" width="220" height="80" rx="14" fill="#E8A53C"/>
        <g stroke="#C97B3D" stroke-width="3" opacity="0.55">
          <line x1="-110" y1="-12" x2="110" y2="-12"/>
          <line x1="-110" y1="12" x2="110" y2="12"/>
          <line x1="-50" y1="-40" x2="-50" y2="40"/>
          <line x1="0" y1="-40" x2="0" y2="40"/>
          <line x1="50" y1="-40" x2="50" y2="40"/>
        </g>
      </g>
      <!-- Mid waffle -->
      <g transform="translate(0,-20)">
        <rect x="-115" y="-44" width="230" height="80" rx="14" fill="#E8A53C"/>
        <g stroke="#C97B3D" stroke-width="3" opacity="0.55">
          <line x1="-115" y1="-16" x2="115" y2="-16"/>
          <line x1="-115" y1="8" x2="115" y2="8"/>
          <line x1="-55" y1="-44" x2="-55" y2="36"/>
          <line x1="0" y1="-44" x2="0" y2="36"/>
          <line x1="55" y1="-44" x2="55" y2="36"/>
        </g>
      </g>
      <!-- Top waffle -->
      <g transform="translate(0,-130)">
        <rect x="-105" y="-44" width="210" height="80" rx="14" fill="#FFD89C"/>
        <g stroke="#C97B3D" stroke-width="3" opacity="0.55">
          <line x1="-105" y1="-16" x2="105" y2="-16"/>
          <line x1="-105" y1="8" x2="105" y2="8"/>
          <line x1="-50" y1="-44" x2="-50" y2="36"/>
          <line x1="0" y1="-44" x2="0" y2="36"/>
          <line x1="50" y1="-44" x2="50" y2="36"/>
        </g>
      </g>
      <!-- Butter pat -->
      <g transform="translate(-10,-180)">
        <rect x="-26" y="-12" width="52" height="22" rx="3" fill="#FFFBF0"/>
        <rect x="-26" y="-12" width="52" height="6" rx="2" fill="#FFFFFF"/>
      </g>
      <!-- Syrup drips -->
      <path d="M-110,-30 q-26,40 -8,72 q-2,8 -8,4 q4,-12 -2,-30 q-12,-22 18,-46 z" fill="#C97B3D" opacity="0.95"/>
      <path d="M90,30 q24,40 -2,68 q-2,4 -6,2 q4,-10 -2,-22 q-6,-14 10,-48 z" fill="#C97B3D" opacity="0.9"/>
    </g></g>
</svg>