<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Butter Squad crew socks">
  
  <defs>
    <radialGradient id="floor" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#FFFFFF"/>
  <ellipse cx="600" cy="1100" rx="350" ry="28" fill="url(#floor)"/>
  <g filter="url(#soft)">
    <!-- Sock A (left) -->
    <g transform="translate(420,0)">
      <path d="M-90,180 L90,180 L90,820 Q90,890 30,890 Q-30,890 -50,820 Z" fill="#FFD89C"/>
      <!-- Toe block -->
      <path d="M-50,820 Q-30,890 30,890 Q90,890 90,820 L120,820 L130,860 Q90,920 30,920 Q-30,920 -60,870 Z" fill="#FFD89C"/>
      <!-- Heel -->
      <path d="M-50,720 Q-90,760 -50,820 L-30,820 Z" fill="#FFD89C"/>
      <!-- Ribbed cuff -->
      <rect x="-90" y="180" width="180" height="50" rx="6" fill="#FFD89C"/>
      <g stroke="rgba(0,0,0,0.10)" stroke-width="1">
        <line x1="-86" y1="190" x2="86" y2="190"/>
        <line x1="-86" y1="204" x2="86" y2="204"/>
        <line x1="-86" y1="218" x2="86" y2="218"/>
      </g>
      <!-- Stripe band -->
      <rect x="-90" y="240" width="180" height="14" fill="#3B2A22"/>
      <!-- Graphic -->
      <g transform="translate(0,400)"><g text-anchor="middle"><text font-family="Inter,sans-serif" font-weight="900" font-size="40" fill="#1F1611">SQUAD</text></g></g>
    </g>
    <!-- Sock B (right) — mirrored -->
    <g transform="translate(780,0) scale(-1,1)">
      <path d="M-90,180 L90,180 L90,820 Q90,890 30,890 Q-30,890 -50,820 Z" fill="#FFD89C"/>
      <path d="M-50,820 Q-30,890 30,890 Q90,890 90,820 L120,820 L130,860 Q90,920 30,920 Q-30,920 -60,870 Z" fill="#FFD89C"/>
      <path d="M-50,720 Q-90,760 -50,820 L-30,820 Z" fill="#FFD89C"/>
      <rect x="-90" y="180" width="180" height="50" rx="6" fill="#FFD89C"/>
      <g stroke="rgba(0,0,0,0.10)" stroke-width="1">
        <line x1="-86" y1="190" x2="86" y2="190"/>
        <line x1="-86" y1="204" x2="86" y2="204"/>
        <line x1="-86" y1="218" x2="86" y2="218"/>
      </g>
      <rect x="-90" y="240" width="180" height="14" fill="#3B2A22"/>
      <g transform="translate(0,400) scale(-1,1)"><g text-anchor="middle"><text font-family="Inter,sans-serif" font-weight="900" font-size="40" fill="#1F1611">SQUAD</text></g></g>
    </g>
  </g>
</svg>