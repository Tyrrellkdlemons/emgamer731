<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Cream EMG731 classic hoodie">
  
  <defs>
    <radialGradient id="floor" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#FFFFFF"/>
  <ellipse cx="600" cy="1100" rx="380" ry="36" fill="url(#floor)"/>
  <!-- Hoodie body -->
  <g filter="url(#soft)">
    <!-- Sleeves -->
    <path d="M260,360 Q200,440 180,640 Q170,760 200,830 L320,810 Q300,720 320,640 Q340,560 380,500 Z" fill="#F4ECDC"/>
    <path d="M940,360 Q1000,440 1020,640 Q1030,760 1000,830 L880,810 Q900,720 880,640 Q860,560 820,500 Z" fill="#F4ECDC"/>
    <!-- Body torso -->
    <path d="M380,360 Q380,300 470,290 L730,290 Q820,300 820,360 L820,970 Q600,1010 380,970 Z" fill="#F4ECDC"/>
    <!-- Hood (back layer) -->
    <path d="M460,300 Q480,170 600,150 Q720,170 740,300 L640,310 Q660,220 600,210 Q560,220 580,310 Z" fill="#F4ECDC"/>
    <!-- Hood inner shadow -->
    <path d="M520,290 Q540,210 600,195 Q660,210 680,290 L620,300 Q640,230 600,220 Q560,230 580,300 Z" fill="#F4ECDC" opacity="0.18"/>
    <!-- Drawstrings -->
    <path d="M570,250 Q568,310 578,340 L574,350 L582,340" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.85"/>
    <path d="M630,250 Q632,310 622,340 L618,350 L610,340" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.85"/>
    <circle cx="574" cy="358" r="6" fill="#FFFFFF"/>
    <circle cx="618" cy="358" r="6" fill="#FFFFFF"/>
    <!-- Sleeve seam shading -->
    <path d="M260,360 Q230,440 220,640 Q215,760 230,830" stroke="rgba(0,0,0,0.06)" stroke-width="2" fill="none"/>
    <path d="M940,360 Q970,440 980,640 Q985,760 970,830" stroke="rgba(0,0,0,0.06)" stroke-width="2" fill="none"/>
    <!-- Shoulder seams -->
    <path d="M380,360 Q420,330 470,330" stroke="rgba(0,0,0,0.07)" stroke-width="2" fill="none"/>
    <path d="M820,360 Q780,330 730,330" stroke="rgba(0,0,0,0.07)" stroke-width="2" fill="none"/>
    <!-- Kangaroo pocket -->
    <path d="M420,720 L780,720 L760,900 L440,900 Z" fill="#F4ECDC"/>
    <path d="M420,720 L780,720" stroke="rgba(0,0,0,0.10)" stroke-width="1.5"/>
    <line x1="430" y1="725" x2="770" y2="725" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
    <!-- Pocket hand openings -->
    <path d="M450,760 Q470,755 490,760" stroke="rgba(0,0,0,0.20)" stroke-width="2" fill="none"/>
    <path d="M750,760 Q730,755 710,760" stroke="rgba(0,0,0,0.20)" stroke-width="2" fill="none"/>
    <!-- Ribbed cuffs (sleeves) -->
    <rect x="195" y="820" width="135" height="32" rx="4" fill="#F4ECDC"/>
    <rect x="870" y="820" width="135" height="32" rx="4" fill="#F4ECDC"/>
    <g stroke="rgba(0,0,0,0.10)" stroke-width="1">
      <line x1="200" y1="826" x2="325" y2="826"/>
      <line x1="200" y1="838" x2="325" y2="838"/>
      <line x1="200" y1="848" x2="325" y2="848"/>
      <line x1="875" y1="826" x2="1000" y2="826"/>
      <line x1="875" y1="838" x2="1000" y2="838"/>
      <line x1="875" y1="848" x2="1000" y2="848"/>
    </g>
    <!-- Ribbed bottom hem -->
    <rect x="385" y="950" width="430" height="38" rx="4" fill="#F4ECDC"/>
    <g stroke="rgba(0,0,0,0.10)" stroke-width="1">
      <line x1="395" y1="958" x2="805" y2="958"/>
      <line x1="395" y1="972" x2="805" y2="972"/>
      <line x1="395" y1="982" x2="805" y2="982"/>
    </g>
  </g>
  <!-- Chest graphic -->
  <g transform="translate(600,540)">
    <g text-anchor="middle">
      <rect x="-160" y="-50" width="320" height="100" rx="50" fill="#1F1611"/>
      <text font-family="Inter,sans-serif" font-weight="900" font-size="64" fill="#FFFCF5" dy="22">EMG<tspan fill="#E8A53C">731</tspan></text>
    </g></g>
</svg>