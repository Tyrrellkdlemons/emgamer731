<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Pink waffle stack crew socks">
  
  <defs>
    <radialGradient id="floor" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#FFFFFF"/>
  <ellipse cx="600" cy="1100" rx="350" ry="28" fill="url(#floor)"/>
  <g filter="url(#soft)">
    <!-- Sock A (left) -->
    <g transform="translate(420,0)">
      <path d="M-90,180 L90,180 L90,820 Q90,890 30,890 Q-30,890 -50,820 Z" fill="#F4B7D6"/>
      <!-- Toe block -->
      <path d="M-50,820 Q-30,890 30,890 Q90,890 90,820 L120,820 L130,860 Q90,920 30,920 Q-30,920 -60,870 Z" fill="#F4B7D6"/>
      <!-- Heel -->
      <path d="M-50,720 Q-90,760 -50,820 L-30,820 Z" fill="#F4B7D6"/>
      <!-- Ribbed cuff -->
      <rect x="-90" y="180" width="180" height="50" rx="6" fill="#F4B7D6"/>
      <g stroke="rgba(0,0,0,0.10)" stroke-width="1">
        <line x1="-86" y1="190" x2="86" y2="190"/>
        <line x1="-86" y1="204" x2="86" y2="204"/>
        <line x1="-86" y1="218" x2="86" y2="218"/>
      </g>
      <!-- Stripe band -->
      <rect x="-90" y="240" width="180" height="14" fill="#1F1611"/>
      <!-- Graphic -->
      <g transform="translate(0,400)"><g text-anchor="middle">
    <g transform="scale(0.35)" text-anchor="middle">
      <!-- Base waffle -->
      <g transform="translate(0,80)">
        <rect x="-110" y="-40" width="220" height="80" rx="14" fill="#E8A53C"/>
        <g stroke="#C97B3D" stroke-width="3" opacity="0.55">
          <line x1="-110" y1="-12" x2="110" y2="-12"/>
          <line x1="-110" y1="12" x2="110" y2="12"/>
          <line x1="-50" y1="-40" x2="-50" y2="40"/>
          <line x1="0" y1="-40" x2="0" y2="40"/>
          <line x1="50" y1="-40" x2="50" y2="40"/>
        </g>
      </g>
      <!-- Mid waffle -->
      <g transform="translate(0,-20)">
        <rect x="-115" y="-44" width="230" height="80" rx="14" fill="#E8A53C"/>
        <g stroke="#C97B3D" stroke-width="3" opacity="0.55">
          <line x1="-115" y1="-16" x2="115" y2="-16"/>
          <line x1="-115" y1="8" x2="115" y2="8"/>
          <line x1="-55" y1="-44" x2="-55" y2="36"/>
          <line x1="0" y1="-44" x2="0" y2="36"/>
          <line x1="55" y1="-44" x2="55" y2="36"/>
        </g>
      </g>
      <!-- Top waffle -->
      <g transform="translate(0,-130)">
        <rect x="-105" y="-44" width="210" height="80" rx="14" fill="#FFD89C"/>
        <g stroke="#C97B3D" stroke-width="3" opacity="0.55">
          <line x1="-105" y1="-16" x2="105" y2="-16"/>
          <line x1="-105" y1="8" x2="105" y2="8"/>
          <line x1="-50" y1="-44" x2="-50" y2="36"/>
          <line x1="0" y1="-44" x2="0" y2="36"/>
          <line x1="50" y1="-44" x2="50" y2="36"/>
        </g>
      </g>
      <!-- Butter pat -->
      <g transform="translate(-10,-180)">
        <rect x="-26" y="-12" width="52" height="22" rx="3" fill="#FFFBF0"/>
        <rect x="-26" y="-12" width="52" height="6" rx="2" fill="#FFFFFF"/>
      </g>
      <!-- Syrup drips -->
      <path d="M-110,-30 q-26,40 -8,72 q-2,8 -8,4 q4,-12 -2,-30 q-12,-22 18,-46 z" fill="#C97B3D" opacity="0.95"/>
      <path d="M90,30 q24,40 -2,68 q-2,4 -6,2 q4,-10 -2,-22 q-6,-14 10,-48 z" fill="#C97B3D" opacity="0.9"/>
    </g></g></g>
    </g>
    <!-- Sock B (right) — mirrored -->
    <g transform="translate(780,0) scale(-1,1)">
      <path d="M-90,180 L90,180 L90,820 Q90,890 30,890 Q-30,890 -50,820 Z" fill="#F4B7D6"/>
      <path d="M-50,820 Q-30,890 30,890 Q90,890 90,820 L120,820 L130,860 Q90,920 30,920 Q-30,920 -60,870 Z" fill="#F4B7D6"/>
      <path d="M-50,720 Q-90,760 -50,820 L-30,820 Z" fill="#F4B7D6"/>
      <rect x="-90" y="180" width="180" height="50" rx="6" fill="#F4B7D6"/>
      <g stroke="rgba(0,0,0,0.10)" stroke-width="1">
        <line x1="-86" y1="190" x2="86" y2="190"/>
        <line x1="-86" y1="204" x2="86" y2="204"/>
        <line x1="-86" y1="218" x2="86" y2="218"/>
      </g>
      <rect x="-90" y="240" width="180" height="14" fill="#1F1611"/>
      <g transform="translate(0,400) scale(-1,1)"><g text-anchor="middle">
    <g transform="scale(0.35)" text-anchor="middle">
      <!-- Base waffle -->
      <g transform="translate(0,80)">
        <rect x="-110" y="-40" width="220" height="80" rx="14" fill="#E8A53C"/>
        <g stroke="#C97B3D" stroke-width="3" opacity="0.55">
          <line x1="-110" y1="-12" x2="110" y2="-12"/>
          <line x1="-110" y1="12" x2="110" y2="12"/>
          <line x1="-50" y1="-40" x2="-50" y2="40"/>
          <line x1="0" y1="-40" x2="0" y2="40"/>
          <line x1="50" y1="-40" x2="50" y2="40"/>
        </g>
      </g>
      <!-- Mid waffle -->
      <g transform="translate(0,-20)">
        <rect x="-115" y="-44" width="230" height="80" rx="14" fill="#E8A53C"/>
        <g stroke="#C97B3D" stroke-width="3" opacity="0.55">
          <line x1="-115" y1="-16" x2="115" y2="-16"/>
          <line x1="-115" y1="8" x2="115" y2="8"/>
          <line x1="-55" y1="-44" x2="-55" y2="36"/>
          <line x1="0" y1="-44" x2="0" y2="36"/>
          <line x1="55" y1="-44" x2="55" y2="36"/>
        </g>
      </g>
      <!-- Top waffle -->
      <g transform="translate(0,-130)">
        <rect x="-105" y="-44" width="210" height="80" rx="14" fill="#FFD89C"/>
        <g stroke="#C97B3D" stroke-width="3" opacity="0.55">
          <line x1="-105" y1="-16" x2="105" y2="-16"/>
          <line x1="-105" y1="8" x2="105" y2="8"/>
          <line x1="-50" y1="-44" x2="-50" y2="36"/>
          <line x1="0" y1="-44" x2="0" y2="36"/>
          <line x1="50" y1="-44" x2="50" y2="36"/>
        </g>
      </g>
      <!-- Butter pat -->
      <g transform="translate(-10,-180)">
        <rect x="-26" y="-12" width="52" height="22" rx="3" fill="#FFFBF0"/>
        <rect x="-26" y="-12" width="52" height="6" rx="2" fill="#FFFFFF"/>
      </g>
      <!-- Syrup drips -->
      <path d="M-110,-30 q-26,40 -8,72 q-2,8 -8,4 q4,-12 -2,-30 q-12,-22 18,-46 z" fill="#C97B3D" opacity="0.95"/>
      <path d="M90,30 q24,40 -2,68 q-2,4 -6,2 q4,-10 -2,-22 q-6,-14 10,-48 z" fill="#C97B3D" opacity="0.9"/>
    </g></g></g>
    </g>
  </g>
</svg>