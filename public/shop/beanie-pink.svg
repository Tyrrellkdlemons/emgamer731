<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Pink EMG beanie with pom">
  
  <defs>
    <radialGradient id="floor" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#FFFFFF"/>
  <ellipse cx="600" cy="980" rx="340" ry="34" fill="url(#floor)"/>
  <g filter="url(#soft)">
    <!-- Crown -->
    <path d="M340,580 Q360,260 600,250 Q840,260 860,580 Z" fill="#F4B7D6"/>
    <!-- Knit lines -->
    <g stroke="rgba(0,0,0,0.10)" stroke-width="1.5" fill="none">
      <line x1="340" y1="580" x2="360" y2="270"/><line x1="372" y1="580" x2="390" y2="270"/><line x1="404" y1="580" x2="420" y2="270"/><line x1="436" y1="580" x2="450" y2="270"/><line x1="468" y1="580" x2="480" y2="270"/><line x1="500" y1="580" x2="510" y2="270"/><line x1="532" y1="580" x2="540" y2="270"/><line x1="564" y1="580" x2="570" y2="270"/><line x1="596" y1="580" x2="600" y2="270"/><line x1="628" y1="580" x2="630" y2="270"/><line x1="660" y1="580" x2="660" y2="270"/><line x1="692" y1="580" x2="690" y2="270"/><line x1="724" y1="580" x2="720" y2="270"/><line x1="756" y1="580" x2="750" y2="270"/><line x1="788" y1="580" x2="780" y2="270"/><line x1="820" y1="580" x2="810" y2="270"/>
    </g>
    <!-- Folded cuff -->
    <rect x="320" y="560" width="560" height="120" rx="14" fill="#F4B7D6"/>
    <g stroke="rgba(0,0,0,0.14)" stroke-width="1.6">
      <line x1="330" y1="600" x2="870" y2="600"/>
      <line x1="330" y1="630" x2="870" y2="630"/>
      <line x1="330" y1="660" x2="870" y2="660"/>
    </g>
    <!-- Top pom -->
    <circle cx="600" cy="240" r="46" fill="#F4B7D6"/>
    <g stroke="rgba(255,255,255,0.45)" stroke-width="2">
      <line x1="600" y1="240" x2="646" y2="240"/><line x1="600" y1="240" x2="641.4445679235113" y2="259.95865199940766"/><line x1="600" y1="240" x2="628.6805308855018" y2="275.9642481935294"/><line x1="600" y1="240" x2="610.2359629619905" y2="284.84668396036386"/><line x1="600" y1="240" x2="589.7640370380095" y2="284.84668396036386"/><line x1="600" y1="240" x2="571.3194691144982" y2="275.9642481935294"/><line x1="600" y1="240" x2="558.5554320764887" y2="259.95865199940766"/><line x1="600" y1="240" x2="554" y2="240"/><line x1="600" y1="240" x2="558.5554320764887" y2="220.04134800059234"/><line x1="600" y1="240" x2="571.3194691144982" y2="204.03575180647064"/><line x1="600" y1="240" x2="589.7640370380095" y2="195.1533160396361"/><line x1="600" y1="240" x2="610.2359629619905" y2="195.1533160396361"/><line x1="600" y1="240" x2="628.6805308855018" y2="204.0357518064706"/><line x1="600" y1="240" x2="641.4445679235113" y2="220.0413480005923"/>
    </g>
    <!-- Tab label -->
    <g transform="translate(600,620)">
      <rect x="-60" y="-22" width="120" height="44" rx="8" fill="#FFFCF5"/>
      <text font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="28" fill="#FFFFFF" text-anchor="middle" dy="10">EMG</text>
    </g>
  </g>
</svg>