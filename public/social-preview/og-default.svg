      <rect x="8" y="29" width="16" height="6" rx="1.4" fill="url(#waffle)" stroke="#C97B3D" stroke-width="0.6"/>
      <rect x="8" y="44" width="20" height="6" rx="1.4" fill="url(#waffle)" stroke="#C97B3D" stroke-width="0.6"/>
      <rect x="8" y="14" width="3" height="36" rx="1" fill="url(#waffle)" stroke="#C97B3D" stroke-width="0.6"/>
      <ellipse cx="40" cy="44" rx="6" ry="2" fill="url(#pancake-edge)"/>
      <ellipse cx="40" cy="42" rx="6" ry="2" fill="url(#pancake)"/>
      <ellipse cx="40" cy="36" rx="6" ry="2" fill="url(#pancake-edge)"/>
      <ellipse cx="40" cy="34" rx="6" ry="2" fill="url(#pancake)"/>
      <ellipse cx="40" cy="28" rx="6" ry="2" fill="url(#pancake-edge)"/>
      <ellipse cx="40" cy="26" rx="6" ry="2" fill="url(#pancake)"/>
      <ellipse cx="54" cy="44" rx="6" ry="2" fill="url(#pancake-edge)"/>
      <ellipse cx="54" cy="42" rx="6" ry="2" fill="url(#pancake)"/>
      <ellipse cx="54" cy="36" rx="6" ry="2" fill="url(#pancake-edge)"/>
      <ellipse cx="54" cy="34" rx="6" ry="2" fill="url(#pancake)"/>
      <ellipse cx="54" cy="28" rx="6" ry="2" fill="url(#pancake-edge)"/>
      <ellipse cx="54" cy="26" rx="6" ry="2" fill="url(#pancake)"/>
      <path d="M40,26 L47,32 L54,26 L54,30 L47,36 L40,30 Z" fill="url(#pancake-edge)" opacity="0.85"/>
      <rect x="44" y="22" width="6" height="4" rx="1" fill="#FFFBF0"/>
    </g>
    <circle cx="124" cy="124" r="9" fill="#E63946" stroke="#FFFCF5" stroke-width="2.5"/>
  </g>

  <text x="260" y="180" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="900" font-size="100" fill="#3B2A22" letter-spacing="-4">EMGamer<tspan fill="#E8A53C" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700">731</tspan></text>
  <text x="80" y="320" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" font-style="italic" font-size="58" fill="#3B2A22" letter-spacing="-2">"What did you guys eat for breakfast today?"</text>
  <text x="80" y="380" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="500" font-size="28" fill="#3B2A22" opacity="0.85">Roblox · breakfast · livestreaming · the cozy creator HQ</text>

  <g transform="translate(0,560)">
